services:
  launcher:
    image: nearone/mpc-launcher@sha256:30fc7c1655d76c6eb3bd7403a67b3a285c9ecd663cfb5e564c258accfe1a3242
    container_name: "${LAUNCHER_IMAGE_NAME}"

    environment:
      - PLATFORM=NONTEE
      - DOCKER_CONTENT_TRUST=1
      - DEFAULT_IMAGE_DIGEST=sha256:9143bc98aaae3408c14cf4490d7b0e96a5a32d989ec865a0cf8dde391831a7a9 # 3.6.0 release

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./user-config.conf:/tapp/user_config:ro
      - shared-volume:/mnt/shared
      - mpc-data:/data

    security_opt:
      - no-new-privileges:true

    read_only: true
    tmpfs:
      - /tmp

volumes:
  shared-volume:
    name: shared-volume
  mpc-data:
    name: mpc-data
