services:
  launcher:
    image: nearone/mpc-launcher@sha256:479a538078af69691b2b5e7cbcd904d6397c89e3d3962aa0d0160f9ca43a661e
    container_name: "${LAUNCHER_IMAGE_NAME}"

    environment:
      - PLATFORM=NONTEE
      - DOCKER_CONTENT_TRUST=1
      - DEFAULT_IMAGE_DIGEST=sha256:689ad0f37a5a9db75eeb93cb15ad4bb507883412f891a4fd19448ada575c8237 # config digest for nearone/mpc-node:main-6ee90e0

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./user-config.toml:/tapp/user_config:ro
      - shared-volume:/mnt/shared
      - mpc-data:/data

    security_opt:
      - no-new-privileges:true

    read_only: true
    tmpfs:
      - /tmp

volumes:
  shared-volume:
    name: shared-volume
  mpc-data:
    name: mpc-data
