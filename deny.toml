[licenses]
clarify = [
  { name = "near-chain", expression = "MIT OR Apache-2.0", license-files = [
  ] },
]
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-3-Clause",
  "BSD-2-Clause",
  "MPL-2.0",
  "Zlib",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "CDDL-1.0",
]
# Per-crate exceptions. Scope these as narrowly as possible — the global
# `allow` list above is what we accept project-wide; entries here are
# transitive deps we cannot easily avoid and have evaluated individually.
exceptions = [
  # `nacl` (LGPL-3.0-or-later) is pulled in transitively via `tonlib-core`,
  # which the foreign-chain-inspector uses purely for TON Bag-of-Cells
  # parsing. We do not link nacl into a binary that we redistribute under
  # a non-LGPL-compatible licence — the MPC node is internal infrastructure
  # not shipped to third parties as a closed-source product. If that ever
  # changes, this exception (and the tonlib-core dep) needs to be revisited.
  { name = "nacl", allow = ["LGPL-3.0-or-later"] },
]

[advisories]
ignore = [
  "RUSTSEC-2022-0054", # wee_alloc is unmaintained
  "RUSTSEC-2025-0134", # rustls-pemfile is unmaintained
  "RUSTSEC-2024-0370", # proc-macro-error is unmaintained
  "RUSTSEC-2024-0436", # paste is unmaintained
  "RUSTSEC-2024-0384", # instant is unmaintained
  "RUSTSEC-2026-0009", # TODO(#1999): Remove once MSVR is bumped to 1.88
  "RUSTSEC-2026-0097", # rand unsound with custom logger + rand::rng(); requires unlikely conditions (custom logger calling rand::rng() during reseed)
  "RUSTSEC-2023-0089", # atomic-polyfill is unmaintained
  "RUSTSEC-2026-0118", # hickory-proto NSEC3 unbounded-loop in DnssecDnsHandle; pulled transitively (nearcore), not reachable — we don't run a DNSSEC-validating resolver path
]

[bans]
multiple-versions = "warn"
skip = [{ name = "windows-sys" }]
skip-tree = [
  { name = "axum" },
  { name = "dstack-sdk" },
  { name = "near-jsonrpc-client" },
  { name = "near-vm-runner" },
  { name = "pprof" },
  { name = "reqwest" },
  { name = "lru" },                 # TODO(#1730): Remove once nearcore updates to a fixed version
]

[sources]
unknown-git = "deny"
allow-git = [
  "https://github.com/near/nearcore",
  "https://github.com/near/reddsa",
  # TODO(#3008): drop this entry when swapping back to a crates.io `dcap-qvl`
  # release containing <https://github.com/Phala-Network/dcap-qvl/pull/153>.
  "https://github.com/Phala-Network/dcap-qvl",
]
