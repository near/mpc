[licenses]
clarify = [
  { name = "near-chain", expression = "MIT OR Apache-2.0", license-files = [
  ] },
]
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-3-Clause",
  "BSD-2-Clause",
  "MPL-2.0",
  "Zlib",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "CDDL-1.0",
]

[advisories]
ignore = [
  "RUSTSEC-2022-0054", # wee_alloc is unmaintained
  "RUSTSEC-2025-0134", # rustls-pemfile is unmaintained
  "RUSTSEC-2024-0370", # proc-macro-error is unmaintained
  "RUSTSEC-2024-0436", # paste is unmaintained
  "RUSTSEC-2024-0384", # instant is unmaintained
  "RUSTSEC-2026-0009", # TODO(#1999): Remove once MSVR is bumped to 1.88
  "RUSTSEC-2023-0089", # atomic-polyfill is unmaintained
  "RUSTSEC-2026-0118", # hickory-proto NSEC3 unbounded loop; no safe upgrade (fix is in hickory-net 0.26.1). Pulled in transitively via reqwest -> hickory-resolver; we don't enable dnssec-ring/dnssec-aws-lc-rs or use DnssecDnsHandle, so unreachable.
  "RUSTSEC-2026-0119", # hickory-proto O(n^2) name compression CPU exhaustion during message encoding; fix only in 0.26.1 and we are pinned to 0.25.x by hickory-resolver 0.25.x (via reqwest). DoS targets encoding of attacker-controlled messages with many records, which doesn't apply to our DNS-client usage (small A/AAAA queries).
]

[bans]
multiple-versions = "warn"
skip = [{ name = "windows-sys" }]
skip-tree = [
  { name = "axum" },
  { name = "dstack-sdk" },
  { name = "near-jsonrpc-client" },
  { name = "near-vm-runner" },
  { name = "pprof" },
  { name = "reqwest" },
  { name = "lru" },                 # TODO(#1730): Remove once nearcore updates to a fixed version
]

[sources]
unknown-git = "deny"
allow-git = [
  "https://github.com/near/nearcore",
  "https://github.com/near/reddsa",
  # TODO(#3008): drop this entry when swapping back to a crates.io `dcap-qvl`
  # release containing <https://github.com/Phala-Network/dcap-qvl/pull/153>.
  "https://github.com/Phala-Network/dcap-qvl",
]
