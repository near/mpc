version: '3.8'

services:
  launcher:
    image: nearone/mpc-launcher@sha256:38a72bdda6fa98c391dcd672da4539eb353eb34448b9bf6dfbdd19b0c8b1099e

    container_name: launcher

    environment:
      - PLATFORM=TEE
      - DOCKER_CONTENT_TRUST=1
      - DEFAULT_IMAGE_DIGEST=sha256:0f4ad58857865f1dd6df1382755798dc8b0219b12d511410b53c21b68ad356d1

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/dstack.sock:/var/run/dstack.sock
      - /tapp:/tapp:ro
      - shared-volume:/mnt/shared:rw

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /tmp

volumes:
  shared-volume:
    name: shared-volume
