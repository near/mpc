# TOML equivalent of deployment/localnet/foreign_chains.yaml, namespaced
# under `[node.foreign_chains.*]` so it can be spliced into a TOML config
# produced by `envsubst < docs/localnet/mpc-config.template.toml > ...`.
#
# Usage:
#   1. Source the keys:  set -a; source deployment/localnet/.env; set +a
#   2. Render your mpc-config.toml from the template per docs/localnet/localnet.md.
#   3. Replace the rendered file's `[node.foreign_chains.*]` blocks (the
#      "public"-only stubs around lines 58–86 of the template) with the
#      contents of THIS file.
#   4. Run: RUST_LOG=info mpc-node start-with-config-file <path>
#
# Exclusions and known-failing combos are documented in the YAML sibling.

[node.foreign_chains.bitcoin]
timeout_sec = 30
max_retries = 3
sample_tx_id = "58ee376171bcc4e2cc040c13848d420b5eaf2f634872055b0a08c1fc2ec6453c"

[node.foreign_chains.bitcoin.providers.ankr]
rpc_url = "https://rpc.ankr.com/btc/{api_key}"
auth = { kind = "path", placeholder = "{api_key}", token = { env = "ANKR_API_KEY" } }

[node.foreign_chains.bitcoin.providers.blockdaemon]
rpc_url = "https://svc.blockdaemon.com/bitcoin/mainnet/native"
auth = { kind = "header", name = "Authorization", scheme = "Bearer", token = { env = "BLOCKDAEMON_API_KEY" } }

[node.foreign_chains.bitcoin.providers.drpc]
rpc_url = "https://lb.drpc.org/ogrpc?network=bitcoin"
auth = { kind = "query", name = "dkey", token = { env = "DRPC_API_KEY" } }

[node.foreign_chains.bitcoin.providers.nownodes]
rpc_url = "https://btc.nownodes.io/"
auth = { kind = "header", name = "api-key", token = { env = "NOWNODES_API_KEY" } }

[node.foreign_chains.bitcoin.providers.tatum]
rpc_url = "https://bitcoin-mainnet.gateway.tatum.io/"
auth = { kind = "header", name = "x-api-key", token = { env = "TATUM_API_KEY" } }

