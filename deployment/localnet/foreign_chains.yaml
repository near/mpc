# Foreign-chain RPC providers for localnet.
#
# All (chain, provider) combos below were probed once with the chain's
# canonical RPC method (`eth_getTransactionReceipt` / `getrawtransaction` /
# `starknet_getTransactionReceipt` / `getTransaction`) and returned a valid
# non-null result.
#
# API keys are referenced via `{ env: <VAR_NAME> }`. Populate those vars
# from deployment/localnet/.env before starting the node — e.g.
#   set -a; source deployment/localnet/.env; set +a
# The .env file is gitignored.
#
# Sample tx ids come from the manual rpc tests under
# crates/foreign-chain-inspector/tests/*_rpc_manual.rs. Chains without a
# manual-test sample (ethereum/starknet/solana) intentionally omit
# `sample_tx_id`, so the startup probe will skip them — the provider URLs are
# still used to serve real requests at runtime.
#
# URL patterns mirror docs/localnet/mpc-configs/config.yaml.template where
# that file has an entry; ethereum/solana/hyper_evm follow the same per-
# provider conventions extrapolated from the template's other chains.
#
# Providers excluded by configuration:
#   - alchemy / helius              not available (phone / login)
#   - chainstack / quicknode        node-specific URL not provided
#   - getblock / onfinality         per-chain key, target chain not specified
#
# Provider+chain combos excluded by probe failure (and why):
#   - ethereum / nownodes           HTTP 404 "you do not have access to this node"
#   - bnb / blockdaemon             HTTP 404 "protocol not supported"
#   - bnb / nownodes                HTTP 404 "no access"
#   - base / nownodes               HTTP 404 "no access"
#   - base / infura                 HTTP 200 result=null (sample tx not in Infura's Base archive — works for newer txs)
#   - solana / ankr                 HTTP 403 "API key is not allowed to access blockchain"
#   - solana / drpc                 dRPC free tier rejects `getTransaction` ("upgrade to paid tier")
#   - starknet / drpc               dRPC free tier does not expose `starknet_getTransactionReceipt`
#   - starknet / tatum              HTTP 404 (no Starknet endpoint on Tatum gateway)
#   - base / drpc                   dRPC free tier flaps with HTTP 408 timeout on Base receipt queries
#                                   (passed once, failed once on consecutive runs — too unreliable for the probe)

foreign_chains:

  bitcoin:
    timeout_sec: 30
    max_retries: 3
    sample_tx_id: "58ee376171bcc4e2cc040c13848d420b5eaf2f634872055b0a08c1fc2ec6453c"
    providers:
      ankr:
        rpc_url: "https://rpc.ankr.com/btc/{api_key}"
        auth:
          kind: path
          placeholder: "{api_key}"
          token:
            env: ANKR_API_KEY
      blockdaemon:
        rpc_url: "https://svc.blockdaemon.com/bitcoin/mainnet/native"
        auth:
          kind: header
          name: Authorization
          scheme: Bearer
          token:
            env: BLOCKDAEMON_API_KEY
      drpc:
        rpc_url: "https://lb.drpc.org/ogrpc?network=bitcoin"
        auth:
          kind: query
          name: dkey
          token:
            env: DRPC_API_KEY
      nownodes:
        rpc_url: "https://btc.nownodes.io/"
        auth:
          kind: header
          name: api-key
          token:
            env: NOWNODES_API_KEY
      tatum:
        rpc_url: "https://bitcoin-mainnet.gateway.tatum.io/"
        auth:
          kind: header
          name: x-api-key
          token:
            env: TATUM_API_KEY

