[package]
name = "tee-authority"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }

[features]
external-services-tests = []

[dependencies]
anyhow = { workspace = true }
backon = { workspace = true }
dcap-qvl = { workspace = true, features = ["report"] }
derive_more = { workspace = true }
dstack-sdk = { workspace = true }
hex = { workspace = true }
launcher-interface = { workspace = true }
mpc-attestation = { workspace = true }
# Pinned to match the version used by `dcap-qvl` so we can pass a
# `reqwest::Client` directly into `CollateralClient::new`. The workspace
# pin is on a newer major (0.13) used by other crates.
reqwest = { version = "0.12.24", default-features = false, features = ["rustls-tls"] }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
hex = { workspace = true }
rstest = { workspace = true }
test-utils = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[lints]
workspace = true
