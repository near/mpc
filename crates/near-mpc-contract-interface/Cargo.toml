[package]
name = "near-mpc-contract-interface"
version = "0.0.1"
license = { workspace = true }
edition = { workspace = true }
repository.workspace = true
description = "Request and response types for the NEAR MPC signer contract"
readme = "README.md"

[features]
abi = [
    "borsh/unstable__schema",
    "mpc-primitives/abi",
    "near-mpc-bounded-collections/abi",
    "near-mpc-crypto-types/abi",
    "schemars",
]
blstrs = ["near-mpc-crypto-types/blstrs"]
# Helpers that build `FunctionCallArgs` for the contract's methods (off in the wasm contract build).
# Pulls the curve features so the crypto DTOs in the call args are `Serialize`.
call-args = ["dep:serde_json", "dep:mpc-call-args", "dep:thiserror", "blstrs", "ed25519-dalek", "k256"]
ed25519-dalek = ["near-mpc-crypto-types/ed25519-dalek"]
k256 = ["near-mpc-crypto-types/k256"]
near = ["near-mpc-crypto-types/near"]

[dependencies]
borsh = { workspace = true }
derive_more = { workspace = true }
mpc-call-args = { workspace = true, optional = true }
mpc-primitives = { workspace = true }
near-mpc-bounded-collections = { workspace = true }
near-mpc-crypto-types = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true, optional = true }
serde_repr = { workspace = true }
serde_with = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true, optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
schemars = { workspace = true, optional = true }

[dev-dependencies]
assert_matches = { workspace = true }
borsh = { workspace = true }
hex = { workspace = true }
insta = { workspace = true }
rstest = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
