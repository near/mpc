[package]
name = "test-tee-verifier-types"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }

# Wire types shared between the `test-tee-verifier` stub contract and the sandbox
# tests that drive it. Kept as a plain (non-`#[near]`) lib so a test crate can depend
# on it without pulling a contract's duplicate ABI symbol under `--all-features`.

[features]
# Mirrors the stub's `abi` feature: derives the borsh schema on the wire types so
# the stub's ABI generation can include them.
abi = ["borsh/unstable__schema", "tee-verifier-interface/borsh-schema"]

[dependencies]
borsh = { workspace = true }
tee-verifier-interface = { workspace = true }

[lints]
workspace = true
