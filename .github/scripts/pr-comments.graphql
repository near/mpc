query($owner: String!, $repo: String!, $prNumber: Int!) {
  repository(owner: $owner, name: $repo) {
    pullRequest(number: $prNumber) {
      comments(first: 100) {
        totalCount
        nodes {
          author { login }
          body
          createdAt
        }
      }
      reviewThreads(first: 100) {
        totalCount
        nodes {
          isResolved
          isOutdated
          path
          line
          comments(first: 50) {
            nodes {
              author { login }
              body
              createdAt
              diffHunk
            }
          }
        }
      }
      reviews(first: 50) {
        totalCount
        nodes {
          author { login }
          body
          state
          createdAt
        }
      }
    }
  }
}
