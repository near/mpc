name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  # Primes the new week's Rust cache on main right after the weekly `prefix-key` rolls
  # over at UTC Sun 00:00. Without this, the first PR on Sunday pays a full cold-build
  # cost and (since `save-if` requires main) doesn't save, so every subsequent Sunday
  # PR keeps cold-building until something merges to main. See near/mpc#2828.
  schedule:
    - cron: "5 0 * * 0"

jobs:
  docker-tee-build:
    name: "Build MPC Node TEE Docker image"
    runs-on: warp-ubuntu-2404-x64-16x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: ./.github/actions/restore-nix-cache

      - name: Build MPC Node image and load into Docker
        run: |
          archive=$(nix build --no-link --print-out-paths .#node-image)
          docker load < "$archive"

      - name: Check mpc-node docker image can initialize and start
        run: ./scripts/check-mpc-node-docker-starts.sh

  docker-rust-launcher-build-and-verify:
    name: "Build Rust Launcher Docker image and verify"
    runs-on: warp-ubuntu-2404-x64-8x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: ./.github/actions/restore-nix-cache

      - name: Build Rust launcher docker image and verify its hash
        shell: bash
        run: ./scripts/build-and-verify-rust-launcher-docker-image.sh

      - name: Load launcher image into Docker
        run: |
          archive=$(nix build --no-link --print-out-paths .#rust-launcher-image)
          docker load < "$archive"

      - name: Run Rust launcher non-TEE runtime check
        shell: bash
        run: ./scripts/check-mpc-node-docker-starts.sh --rust-launcher

  mpc-unittests:
    name: "Cargo test: ${{ matrix.group }}"
    runs-on: ${{ matrix.runner || 'warp-ubuntu-2404-x64-16x' }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: "node"
            nextest-args: "-p mpc-node"
          - group: "contract"
            nextest-args: "--profile=ci-contract -p mpc-contract"
            extra-tools: true
            runner: warp-ubuntu-2404-x64-32x
          - group: "other"
            nextest-args: "--profile=ci-other"
            extra-tools: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: ./.github/actions/restore-nix-cache

      - run: echo "WEEK=$(date -u +%Y-%U)" >> "$GITHUB_ENV"
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-provider: "warpbuild"
          prefix-key: v1-rust-tests-${{ matrix.group }}-week-${{ env.WEEK }}

      - name: Run cargo-nextest
        run: nix develop --command cargo nextest run --cargo-profile=test-release --all-features --locked ${{ matrix.nextest-args }}

  mpc-contract-reproducible-build:
    name: "MPC contract reproducible build"
    runs-on: warp-ubuntu-2404-x64-16x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      # only save nix cache in this single job to avoid duplicate cache saves from other jobs
      - name: Restore /nix from cache
        uses: ./.github/actions/restore-nix-cache
        with:
          save: ${{ github.ref == 'refs/heads/main' }}

      - name: Build mpc-contract (reproducible)
        run: |
          nix develop --command cargo near build reproducible-wasm \
            --manifest-path crates/contract/Cargo.toml

      - name: Check contract WASM size
        run: nix develop --command bash scripts/check-contract-wasm-size.sh

  nix-build-mpc-node:
    name: "Nix build mpc-node"
    permissions:
      contents: read
    uses: ./.github/workflows/nix-build-mpc-node.yml

  fast-ci-checks:
    name: "Fast CI checks"
    runs-on: warp-ubuntu-2404-x64-8x
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: ./.github/actions/restore-nix-cache

      - run: echo "WEEK=$(date -u +%Y-%U)" >> "$GITHUB_ENV"
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-provider: "warpbuild"
          prefix-key: v1-rust-week-${{ env.WEEK }}

      - name: Run cargo-make fast checks
        run: nix develop --command cargo make check-all-fast

  mpc-e2e-tests:
    name: "MPC E2E tests"
    runs-on: warp-ubuntu-2404-x64-32x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: ./.github/actions/restore-nix-cache

      - run: echo "WEEK=$(date -u +%Y-%U)" >> "$GITHUB_ENV"
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-provider: "warpbuild"
          prefix-key: v1-rust-e2e-week-${{ env.WEEK }}

      - name: Build mpc-node
        run: nix develop --command cargo make build-mpc-node-network-hardship-simulation

      - name: Build mpc-contract
        if: github.ref != 'refs/heads/main'
        run: nix develop --command cargo make build-mpc-contract-optimized

      - name: Build mpc-contract reproducibly
        if: github.ref == 'refs/heads/main'
        run: |
          nix develop --command cargo near build reproducible-wasm \
            --manifest-path crates/contract/Cargo.toml \
            --out-dir target/wasm32-unknown-unknown/release-contract

      - name: Build test-parallel-contract
        run: nix develop --command cargo make build-test-parallel-contract-optimized

      - name: Build backup-cli
        run: nix develop --command cargo build -p backup-cli --release --locked

      - name: Run E2E tests
        run: nix develop --command cargo make e2e-tests-skip-build
        env:
          RUST_LOG: info,e2e_tests=debug

  ci-extra:
    name: "Extra CI checks"
    runs-on: warp-ubuntu-2404-x64-2x
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: ./.github/actions/restore-nix-cache

      - name: Run cargo-make extra checks
        run: nix develop --command cargo make check-extra

  check-todo-closed-issues:
    name: "Check TODOs for issues closed by this PR"
    if: github.event_name == 'pull_request'
    runs-on: warp-ubuntu-2404-x64-2x
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Check TODOs for issues closed by this PR
        run: bash .github/scripts/check-todo-closed-issues.sh
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
