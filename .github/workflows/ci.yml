name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main
  # Primes the new week's Rust cache on main right after the weekly `prefix-key` rolls
  # over at UTC Sun 00:00. Without this, the first PR on Sunday pays a full cold-build
  # cost and (since `save-if` requires main) doesn't save, so every subsequent Sunday
  # PR keeps cold-building until something merges to main. See near/mpc#2828.
  schedule:
    - cron: "5 0 * * 0"

jobs:
  docker-tee-build:
    name: "Build MPC Node TEE Docker image"
    runs-on: warp-ubuntu-2404-x64-16x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Allow unprivileged user namespaces (needed by repro-env/podman on Ubuntu 24.04)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install repro-env
        run: |
          wget 'https://github.com/kpcyrd/repro-env/releases/download/v0.4.3/repro-env'
          echo '2a00b21ac5e990e0c6a0ccbf3b91e34a073660d1f4553b5f3cda2b09cc4d4d8a  repro-env' | sha256sum -c -
          sudo install -m755 repro-env -t /usr/bin

      - name: Build MPC Node binary and image
        run: |
          export NODE_IMAGE_NAME=test_image_tag_ci
          ./deployment/build-images.sh --node

      - name: Check mpc-node docker image can initialize and start
        run: |
          export NODE_IMAGE_NAME=test_image_tag_ci
          ./scripts/check-mpc-node-docker-starts.sh

  docker-rust-launcher-build-and-verify:
    name: "Build Rust Launcher Docker image and verify"
    runs-on: warp-ubuntu-2404-x64-8x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Allow unprivileged user namespaces (needed by repro-env/podman on Ubuntu 24.04)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo liblzma-dev podman

      - name: Install repro-env
        run: |
          wget 'https://github.com/kpcyrd/repro-env/releases/download/v0.4.3/repro-env'
          echo '2a00b21ac5e990e0c6a0ccbf3b91e34a073660d1f4553b5f3cda2b09cc4d4d8a  repro-env' | sha256sum -c -
          sudo install -m755 repro-env -t /usr/bin

      - name: Build Rust launcher docker image and verify its hash
        shell: bash
        run: |
          ./scripts/build-and-verify-rust-launcher-docker-image.sh

      - name: Run Rust launcher non-TEE runtime check
        shell: bash
        run: |
          ./scripts/check-mpc-node-docker-starts.sh --rust-launcher

  mpc-unittests:
    name: "Cargo test: ${{ matrix.group }}"
    runs-on: ${{ matrix.runner || 'warp-ubuntu-2404-x64-16x' }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: "node"
            nextest-args: "-p mpc-node"
          - group: "contract"
            nextest-args: "--profile=ci-contract -p mpc-contract"
            extra-tools: true
            runner: warp-ubuntu-2404-x64-32x
          - group: "other"
            nextest-args: "--profile=ci-other"
            extra-tools: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: near/cache-nix-action@3e2c4eea4e825e74575cbc8e25d38173df7686c2 # enable-warpbuild-cache
        with:
          backend: warpbuild
          primary-key: nix-${{ runner.os }}-ci-${{ hashFiles('flake.nix', 'flake.lock', 'nix/**', 'rust-toolchain.toml', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-ci-
          save: ${{ github.ref == 'refs/heads/main' }}

      - run: echo "WEEK=$(date -u +%Y-%U)" >> "$GITHUB_ENV"
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref != 'refs/heads/main' }}
          cache-provider: "warpbuild"
          prefix-key: test-v0-rust-tests-${{ matrix.group }}-week-${{ env.WEEK }}

      - name: Run cargo-nextest
        run: nix develop --command cargo nextest run --cargo-profile=test-release --all-features --locked ${{ matrix.nextest-args }}

  mpc-contract-reproducible-build:
    name: "MPC contract reproducible build"
    runs-on: warp-ubuntu-2404-x64-16x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: near/cache-nix-action@3e2c4eea4e825e74575cbc8e25d38173df7686c2 # enable-warpbuild-cache
        with:
          backend: warpbuild
          primary-key: nix-${{ runner.os }}-ci-${{ hashFiles('flake.nix', 'flake.lock', 'nix/**', 'rust-toolchain.toml', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-ci-
          save: ${{ github.ref == 'refs/heads/main' }}

      - name: Build mpc-contract (reproducible)
        run: |
          nix develop --command cargo near build reproducible-wasm \
            --manifest-path crates/contract/Cargo.toml

      - name: Check contract WASM size
        run: nix develop --command bash scripts/check-contract-wasm-size.sh

  nix-build-mpc-node:
    name: "Nix build mpc-node"
    permissions:
      contents: read
    uses: ./.github/workflows/nix-build-mpc-node.yml

  fast-ci-checks:
    name: "Fast CI checks"
    runs-on: warp-ubuntu-2404-x64-8x
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: near/cache-nix-action@3e2c4eea4e825e74575cbc8e25d38173df7686c2 # enable-warpbuild-cache
        with:
          backend: warpbuild
          primary-key: nix-${{ runner.os }}-ci-${{ hashFiles('flake.nix', 'flake.lock', 'nix/**', 'rust-toolchain.toml', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-ci-
          save: ${{ github.ref == 'refs/heads/main' }}

      - run: echo "WEEK=$(date -u +%Y-%U)" >> "$GITHUB_ENV"
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref != 'refs/heads/main' }}
          cache-provider: "warpbuild"
          prefix-key: test-v0-rust-week-${{ env.WEEK }}

      - name: Run cargo-make fast checks
        run: nix develop --command cargo make check-all-fast

  mpc-e2e-tests:
    name: "MPC E2E tests"
    runs-on: warp-ubuntu-2404-x64-32x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: near/cache-nix-action@3e2c4eea4e825e74575cbc8e25d38173df7686c2 # enable-warpbuild-cache
        with:
          backend: warpbuild
          primary-key: nix-${{ runner.os }}-ci-${{ hashFiles('flake.nix', 'flake.lock', 'nix/**', 'rust-toolchain.toml', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-ci-
          save: ${{ github.ref == 'refs/heads/main' }}

      - run: echo "WEEK=$(date -u +%Y-%U)" >> "$GITHUB_ENV"
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref != 'refs/heads/main' }}
          cache-provider: "warpbuild"
          prefix-key: test-v0-rust-e2e-week-${{ env.WEEK }}

      - name: Build mpc-node
        run: nix develop --command cargo make build-mpc-node-network-hardship-simulation

      - name: Build mpc-contract
        if: github.ref != 'refs/heads/main'
        run: nix develop --command cargo make build-mpc-contract-optimized

      - name: Build mpc-contract reproducibly
        if: github.ref == 'refs/heads/main'
        run: |
          nix develop --command cargo near build reproducible-wasm \
            --manifest-path crates/contract/Cargo.toml \
            --out-dir target/wasm32-unknown-unknown/release-contract

      - name: Build test-parallel-contract
        run: nix develop --command cargo make build-test-parallel-contract-optimized

      - name: Build backup-cli
        run: nix develop --command cargo build -p backup-cli --release --locked

      - name: Download near core binary from S3
        id: download-neard
        continue-on-error: true
        run: |
          os=$(uname)
          arch=$(uname -m)
          os_and_arch=${os}-${arch}
          cd libs/nearcore

          branches=$(git branch -r --contains HEAD | grep -o 'origin/[^ ]*' | sed 's|origin/||' || true)
          commit_hash=$(git rev-parse HEAD || echo "no-commit")

          mkdir -p target/release
          downloaded=false
          for branch_name in $branches; do
            url="https://s3.us-west-1.amazonaws.com/build.nearprotocol.com/nearcore/${os_and_arch}/${branch_name}/${commit_hash}/neard"
            status_code=$(curl -s -f -o target/release/neard -w "%{http_code}" "${url}" || true)
            if [ "$status_code" -eq 200 ]; then
              echo "Downloaded neard from branch: ${branch_name}"
              downloaded=true
              break
            fi
            echo "Branch ${branch_name} failed (status ${status_code}), trying next..."
          done

          if [ "$downloaded" != "true" ]; then
            echo "All branches failed for commit ${commit_hash}"
            exit 1
          fi
          chmod +x target/release/neard

      - name: Build near core as fallback
        if: steps.download-neard.outcome != 'success'
        working-directory: libs/nearcore
        run: nix develop ../.. --command cargo build -p neard --release

      - name: Run E2E tests
        run: nix develop --command cargo make e2e-tests-skip-build
        env:
          RUST_LOG: info,e2e_tests=debug

  ci-extra:
    name: "Extra CI checks"
    runs-on: warp-ubuntu-2404-x64-2x
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Restore /nix from cache
        uses: near/cache-nix-action@3e2c4eea4e825e74575cbc8e25d38173df7686c2 # enable-warpbuild-cache
        with:
          backend: warpbuild
          primary-key: nix-${{ runner.os }}-ci-${{ hashFiles('flake.nix', 'flake.lock', 'nix/**', 'rust-toolchain.toml', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-ci-
          save: ${{ github.ref == 'refs/heads/main' }}

      - name: Run cargo-make extra checks
        run: nix develop --command cargo make check-extra

  check-todo-closed-issues:
    name: "Check TODOs for issues closed by this PR"
    if: github.event_name == 'pull_request'
    runs-on: warp-ubuntu-2404-x64-2x
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Check TODOs for issues closed by this PR
        run: bash .github/scripts/check-todo-closed-issues.sh
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
