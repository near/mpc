name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - main

jobs:
  docker-tee-build:
    name: "Build MPC Node TEE Docker image"
    runs-on: warp-ubuntu-2404-x64-16x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Allow unprivileged user namespaces (needed by repro-env/podman on Ubuntu 24.04)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install repro-env
        run: |
          wget 'https://github.com/kpcyrd/repro-env/releases/download/v0.4.3/repro-env'
          echo '2a00b21ac5e990e0c6a0ccbf3b91e34a073660d1f4553b5f3cda2b09cc4d4d8a  repro-env' | sha256sum -c -
          sudo install -m755 repro-env -t /usr/bin

      - name: Build MPC Node binary and image
        run: |
          export NODE_IMAGE_NAME=test_image_tag_ci
          ./deployment/build-images.sh --node

      - name: Check mpc-node docker image can initialize and start
        run: |
          export NODE_IMAGE_NAME=test_image_tag_ci
          ./scripts/check-mpc-node-docker-starts.sh

  launcher-nontee-check:
    name: "MPC Launcher non-tee check"
    runs-on: warp-ubuntu-2404-x64-2x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Check mpc-node docker image can initialize through the launcher and start
        run: |
          ./scripts/check-mpc-node-docker-starts.sh --launcher

  docker-launcher-build-and-verify:
    name: "Build MPC Launcher Docker image and verify"
    runs-on: warp-ubuntu-2404-x64-2x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Build launcher docker image and verify its hash
        shell: bash
        run: |
          ./scripts/build-and-verify-launcher-docker-image.sh

  mpc-unittests:
    name: "Cargo test"
    runs-on: warp-ubuntu-2404-x64-16x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblzma-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-provider: "warpbuild"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: nextest@0.9.126

      - name: Install cargo-binstall
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-binstall

      - name: Install cargo-near
        run: |
          sudo apt-get update && sudo apt-get install --assume-yes libudev-dev
          cargo binstall --force --no-confirm --locked cargo-near@0.19.1 --pkg-url="{ repo }/releases/download/{ name }-v{ version }/{ name }-{ target }.{ archive-format }"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install wasm-opt
        run: |
          cargo binstall --force --no-confirm --locked wasm-opt@0.116.1
          echo "${HOME}/.cargo/bin" >> $GITHUB_PATH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cargo-nextest
        run: cargo nextest run --cargo-profile=test-release --all-features --locked --profile=ci-workflow

  mpc-pytest-build:
    name: "MPC pytests: build"
    runs-on: warp-ubuntu-2404-x64-16x
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      MPC_PYTEST_BINARIES_CACHE_KEY: mpc-pytest-binaries-${{ github.run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-provider: "warpbuild"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblzma-dev libudev-dev

      - name: Install cargo-binstall
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-binstall

      - name: Install cargo-near
        run: |
          cargo binstall --force --no-confirm --locked cargo-near@0.19.1 --pkg-url="{ repo }/releases/download/{ name }-v{ version }/{ name }-{ target }.{ archive-format }"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install wasm-opt
        run: |
          cargo binstall --force --no-confirm --locked wasm-opt@0.116.1
          echo "${HOME}/.cargo/bin" >> $GITHUB_PATH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build mpc-node
        run: |
          cargo build -p mpc-node --release --features network-hardship-simulation,test-utils --locked

      - name: Build mpc-contract
        run: |
          cargo near build reproducible-wasm \
            --manifest-path crates/contract/Cargo.toml \
            --out-dir target/wasm32-unknown-unknown/release-contract

      - name: Build test-parallel-contract
        run: |
          cargo build -p test-parallel-contract --target=wasm32-unknown-unknown --profile=release-contract --locked
          wasm-opt -Oz \
            target/wasm32-unknown-unknown/release-contract/test_parallel_contract.wasm \
            -o target/wasm32-unknown-unknown/release-contract/test_parallel_contract.wasm

      - name: Build backup-cli
        run: |
          cargo build -p backup-cli --release --locked

      - name: Download near core binary from S3
        id: download-neard
        continue-on-error: true
        run: |
          os=$(uname)
          arch=$(uname -m)
          os_and_arch=${os}-${arch}
          cd libs/nearcore

          branches=$(git branch -r --contains HEAD | grep -o 'origin/[^ ]*' | sed 's|origin/||' || true)
          commit_hash=$(git rev-parse HEAD || echo "no-commit")

          mkdir -p target/release
          downloaded=false
          for branch_name in $branches; do
            url="https://s3.us-west-1.amazonaws.com/build.nearprotocol.com/nearcore/${os_and_arch}/${branch_name}/${commit_hash}/neard"
            status_code=$(curl -s -f -o target/release/neard -w "%{http_code}" "${url}" || true)
            if [ "$status_code" -eq 200 ]; then
              echo "Downloaded neard from branch: ${branch_name}"
              downloaded=true
              break
            fi
            echo "Branch ${branch_name} failed (status ${status_code}), trying next..."
          done

          if [ "$downloaded" != "true" ]; then
            echo "All branches failed for commit ${commit_hash}"
            exit 1
          fi
          chmod +x target/release/neard

      - name: Build near core as fallback
        if: steps.download-neard.outcome != 'success'
        run: |
          cd libs/nearcore
          cargo build -p neard --release

      - name: Save pytest binaries cache
        uses: WarpBuilds/cache/save@8e2c4dd9bdfe2460f9f0d558ce34d030589e1556 # v1
        with:
          key: ${{ env.MPC_PYTEST_BINARIES_CACHE_KEY }}
          path: |
            target/release/mpc-node
            target/release/backup-cli
            target/wasm32-unknown-unknown/release-contract/mpc_contract.wasm
            target/wasm32-unknown-unknown/release-contract/test_parallel_contract.wasm
            libs/nearcore/target/release/neard

  mpc-pytests:
    name: "MPC pytests: ${{ matrix.group }}"
    needs: mpc-pytest-build
    runs-on: warp-ubuntu-2404-x64-16x
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      MPC_PYTEST_BINARIES_CACHE_KEY: mpc-pytest-binaries-${{ github.run_id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: "shared-cluster"
            tests: "tests/shared_cluster_tests/"
          - group: "robust-ecdsa"
            tests: "tests/robust_ecdsa/"
          - group: "resharing-cancel"
            tests: "tests/test_cancellation_of_key_resharing.py"
          - group: "resharing-request"
            tests: "tests/test_request_during_resharing.py"
          - group: "foreign-tx"
            tests: "tests/test_foreign_transaction_validation.py tests/test_foreign_chain_policy_auto_voting.py"
          - group: "key-event-single-domain"
            tests: "tests/test_key_event.py::test_single_domain"
          - group: "key-event-multi-domain"
            tests: "tests/test_key_event.py::test_multi_domain"
          - group: "migration"
            tests: "tests/test_migration_service.py"
          - group: "participant-info"
            tests: "tests/test_submit_participant_info.py"
          - group: "lost-assets"
            tests: "tests/test_lost_assets.py"

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Restore pytest binaries cache
        uses: WarpBuilds/cache/restore@8e2c4dd9bdfe2460f9f0d558ce34d030589e1556 # v1
        with:
          key: ${{ env.MPC_PYTEST_BINARIES_CACHE_KEY }}
          fail-on-cache-miss: true
          path: |
            target/release/mpc-node
            target/release/backup-cli
            target/wasm32-unknown-unknown/release-contract/mpc_contract.wasm
            target/wasm32-unknown-unknown/release-contract/test_parallel_contract.wasm
            libs/nearcore/target/release/neard

      - name: Make binaries executable
        run: |
          chmod +x target/release/mpc-node
          chmod +x target/release/backup-cli
          chmod +x libs/nearcore/target/release/neard

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Setup virtualenv
        run: |
          python3 -m venv pytest/venv
          source pytest/venv/bin/activate
          cd pytest
          pip install -r requirements.txt
          cd ../
          git submodule foreach --recursive 'git reset --hard && git clean -fd'

      - name: Run pytest
        run: |
          source pytest/venv/bin/activate
          cd pytest
          pytest -m "not ci_excluded" -s -x --skip-nearcore-build --skip-mpc-node-build --skip-mpc-contract-build --skip-parallel-contract-build --skip-backup-cli-build ${{ matrix.tests }}

  mpc-pytests-cache-cleanup:
    name: "MPC pytests: cache cleanup"
    needs: mpc-pytests
    if: ${{ always() }}
    runs-on: warp-ubuntu-2404-x64-2x
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      MPC_PYTEST_BINARIES_CACHE_KEY: mpc-pytest-binaries-${{ github.run_id }}

    steps:
      - name: Delete pytest binaries cache
        uses: WarpBuilds/cache@8e2c4dd9bdfe2460f9f0d558ce34d030589e1556 # v1
        with:
          delete-cache: true
          key: ${{ env.MPC_PYTEST_BINARIES_CACHE_KEY }}
          path: |
            target/release/mpc-node
            target/release/backup-cli
            target/wasm32-unknown-unknown/release-contract/mpc_contract.wasm
            target/wasm32-unknown-unknown/release-contract/test_parallel_contract.wasm
            libs/nearcore/target/release/neard

  tee-launcher-tests:
    name: "TEE Launcher: pytests"
    runs-on: warp-ubuntu-2404-x64-2x
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Setup virtualenv
        run: |
          python3 -m venv tee_launcher/venv
          source tee_launcher/venv/bin/activate
          cd tee_launcher 
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          source tee_launcher/venv/bin/activate
          cd tee_launcher 
          PYTHONPATH=. pytest -vsx

  fast-ci-checks:
    name: "Fast CI checks"
    runs-on: warp-ubuntu-2404-x64-8x
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-provider: "warpbuild"

      - name: Install ruff
        uses: astral-sh/ruff-action@57714a7c8a2e59f32539362ba31877a1957dded1 # v3.5.1
        with:
          args: "--version" # workaround to avoid running ruff check here

      - name: Install cargo-shear
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-shear@1.9.1

      - name: Install cargo-sort
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-sort@2.0.2

      - name: Install zizmor
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: zizmor@1.22.0

      - name: Install cargo-deny
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-deny@0.19.0

      - name: Install lychee
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: lychee@0.23.0

      - name: Install cargo-make
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-make@0.37.24

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run cargo-make fast checks
        run: cargo make check-all-fast

  ci-extra:
    name: "Extra CI checks"
    runs-on: warp-ubuntu-2404-x64-2x
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install cargo-deny
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-deny@0.19.0

      - name: Install cargo-make
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-make@0.37.24

      - name: Run cargo-make extra checks
        run: cargo make check-extra
