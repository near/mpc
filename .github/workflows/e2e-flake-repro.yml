name: E2E flake repro (#2898)

# Manually-dispatched stress workflow that mirrors ci.yml's `mpc-e2e-tests`
# job as closely as possible: same runner class, same build steps, same
# `cargo make e2e-tests-skip-build` invocation — just run in a loop. On
# failure we upload each node's preserved stdout/stderr/config for
# post-mortem (enabled via the E2E_KEEP_HOME_DIR opt-in).

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "How many times to run the ci-e2e group"
        required: false
        default: "10"

jobs:
  stress:
    name: "E2E flake stress"
    runs-on: warp-ubuntu-2404-x64-32x
    timeout-minutes: 240
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblzma-dev

      - run: echo "WEEK=$(date -u +%Y-%U)" >> "$GITHUB_ENV"
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: false
          cache-provider: "warpbuild"
          prefix-key: v0-rust-week-${{ env.WEEK }}

      - name: Install cargo-binstall
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-binstall

      - name: Install wasm-opt
        run: |
          cargo binstall --force --no-confirm --locked wasm-opt@0.116.1
          echo "${HOME}/.cargo/bin" >> $GITHUB_PATH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: nextest@0.9.126

      - name: Install cargo-make
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-make@0.37.24

      - name: Build mpc-node
        run: cargo make build-mpc-node-network-hardship-simulation

      - name: Build mpc-contract
        run: cargo make build-mpc-contract-optimized

      - name: Build test-parallel-contract
        run: cargo make build-test-parallel-contract-optimized

      - name: Build backup-cli
        run: cargo build -p backup-cli --release --locked

      - name: Run E2E tests in a loop
        env:
          RUST_LOG: info,e2e_tests=debug
          MPC_NODE_LOG: "DEBUG"
          E2E_KEEP_HOME_DIR: "1"
          ITERATIONS: ${{ inputs.iterations }}
        run: |
          set +e
          pass=0
          fail=0
          mkdir -p flake-artifacts
          for i in $(seq 1 "$ITERATIONS"); do
            echo "::group::iteration $i"
            out="flake-artifacts/iter-$i"
            mkdir -p "$out"
            cargo make e2e-tests-skip-build 2>&1 | tee "$out/nextest.log"
            rc=${PIPESTATUS[0]}
            echo "::endgroup::"
            # Move every E2E_HOME_DIR the test printed so we don't leak disk
            # between iterations. Keep them in the artifact dir only on failure.
            grep -E '^E2E_HOME_DIR=' "$out/nextest.log" | sed 's/^E2E_HOME_DIR=//' | while read -r home; do
              if [ -d "$home" ]; then
                mv "$home" "$out/home_$(basename "$home")" 2>/dev/null || true
              fi
            done
            if [ "$rc" -eq 0 ]; then
              pass=$((pass+1))
              echo "iter $i: PASS"
              rm -rf "$out"
            else
              fail=$((fail+1))
              echo "iter $i: FAIL (rc=$rc) — logs preserved in $out"
            fi
          done
          echo "TOTAL: pass=$pass fail=$fail"
          if [ "$fail" -gt 0 ]; then exit 1; fi

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-flake-logs
          path: flake-artifacts/
          if-no-files-found: warn
          retention-days: 7
