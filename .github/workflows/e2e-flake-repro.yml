name: E2E flake repro (#2898)

# Manually-dispatched stress workflow to reproduce the `parallel_sign_calls`
# flake on the same runner class CI uses. Runs the ci-e2e profile in a loop
# with `--no-fail-fast` so a single bad run doesn't abort the whole attempt,
# then uploads each node's stdout/stderr on failure for post-mortem.

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "How many times to run the ci-e2e group"
        required: false
        default: "10"
      test_filter:
        description: "Nextest filter (leave empty for full ci-e2e group)"
        required: false
        default: "parallel_sign_calls::mpc_cluster_should_successfully_process_parallel_requests"

jobs:
  stress:
    name: "E2E flake stress"
    runs-on: warp-ubuntu-2404-x64-32x
    timeout-minutes: 180
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblzma-dev

      - run: echo "WEEK=$(date -u +%Y-%U)" >> "$GITHUB_ENV"
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: false
          cache-provider: "warpbuild"
          prefix-key: v0-rust-e2e-week-${{ env.WEEK }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: nextest@0.9.126

      - name: Install cargo-make
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-make@0.37.24

      - name: Build binaries (once)
        run: |
          cargo make build-mpc-node-network-hardship-simulation
          cargo make build-mpc-contract-optimized
          cargo make build-test-parallel-contract-optimized
          cargo make build-backup-cli

      - name: Run the flaky test in a loop
        env:
          RUST_LOG: info,e2e_tests=debug
          MPC_NODE_LOG: "DEBUG"
          MPC_CONTRACT_WASM: ${{ github.workspace }}/target/wasm32-unknown-unknown/release-contract/mpc_contract.wasm
          MPC_PARALLEL_CONTRACT_WASM: ${{ github.workspace }}/target/wasm32-unknown-unknown/release-contract/test_parallel_contract.wasm
          E2E_KEEP_HOME_DIR: "1"
          ITERATIONS: ${{ inputs.iterations }}
          TEST_FILTER: ${{ inputs.test_filter }}
        run: |
          set +e
          pass=0
          fail=0
          mkdir -p flake-artifacts
          for i in $(seq 1 "$ITERATIONS"); do
            echo "::group::iteration $i"
            out="flake-artifacts/iter-$i"
            mkdir -p "$out"
            if [ -z "$TEST_FILTER" ]; then
              cargo nextest run --no-capture --cargo-profile=test-release \
                --profile ci-e2e -p e2e-tests --all-features --locked \
                --no-fail-fast 2>&1 | tee "$out/nextest.log"
              rc=${PIPESTATUS[0]}
            else
              cargo nextest run --no-capture --cargo-profile=test-release \
                --profile ci-e2e -p e2e-tests --all-features --locked \
                --no-fail-fast "$TEST_FILTER" 2>&1 | tee "$out/nextest.log"
              rc=${PIPESTATUS[0]}
            fi
            echo "::endgroup::"
            # Always grab the home dirs the test printed via E2E_KEEP_HOME_DIR
            # so we can inspect both passing and failing runs.
            grep -E '^E2E_HOME_DIR=' "$out/nextest.log" | sed 's/^E2E_HOME_DIR=//' | while read -r home; do
              if [ -d "$home" ]; then
                cp -a "$home" "$out/home_$(basename "$home")"
                rm -rf "$home"
              fi
            done
            if [ "$rc" -eq 0 ]; then
              pass=$((pass+1))
              echo "iter $i: PASS"
              # Keep logs only on failure to keep artifacts small.
              rm -rf "$out"
            else
              fail=$((fail+1))
              echo "iter $i: FAIL (rc=$rc) — logs preserved in $out"
            fi
          done
          echo "TOTAL: pass=$pass fail=$fail"
          if [ "$fail" -gt 0 ]; then exit 1; fi

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-flake-logs
          path: flake-artifacts/
          if-no-files-found: warn
          retention-days: 7
