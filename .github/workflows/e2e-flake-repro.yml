name: E2E flake repro (#2898)

# Stress workflow for reproducing parallel-robust-ECDSA flakiness (#2898).
# Mirrors ci.yml's `mpc-e2e-tests` build steps, then loops the full nextest
# e2e suite consecutively to surface intermittent failures.
#
# Triggers (the workflow file does NOT need to be on `main`):
#
#   1. Push to any branch with `[flake-repro]` in the head commit message.
#      Use an empty commit when you just want to re-run on the same code:
#
#          git commit --allow-empty -m "[flake-repro]" && git push
#
#      Defaults: iterations=200, test_filter=all (whole e2e suite).
#
#   2. From the GitHub Actions UI: open any prior run and click
#      "Re-run all jobs". GitHub replays the workflow at that SHA, no
#      new commit needed.
#
#   3. workflow_dispatch (only works once this file lands on `main` —
#      kept here so dispatch with custom inputs becomes available later).
#
# Artifacts (always uploaded):
#   - per-iteration nextest stdout/stderr (`iter-N/nextest.log`)
#   - on failure: each node's preserved home dir, including `stdout.log`,
#     `stderr.log`, and the generated config files (E2E_KEEP_HOME_DIR opt-in).
#   - run summary (`summary.txt`) with pass/fail counts.
#   - resource-usage telemetry (`telemetry/e2e-resource-usage.csv`) covering
#     the whole iteration loop, for correlating flakes with CPU / load /
#     memory pressure (see PR #3055 for the same approach in ci.yml).

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      iterations:
        description: "How many times to run the test loop"
        required: false
        default: "200"
      test_filter:
        description: "Nextest substring filter. Use 'all' to run every e2e test."
        required: false
        default: "all"
      keep_all_homes:
        description: "Preserve E2E_HOME_DIR on success too (large artifacts)"
        required: false
        type: boolean
        default: false

jobs:
  stress:
    name: "E2E flake stress"
    # Push: only run when the head commit explicitly opts in. This keeps a
    # multi-hour stress job from firing on every unrelated push.
    # workflow_dispatch and re-run-all-jobs both run unconditionally.
    if: >-
      github.event_name != 'push' ||
      contains(github.event.head_commit.message, '[flake-repro]')
    runs-on: warp-ubuntu-2404-x64-32x
    # 200 iterations: recent runs average ~85s/iter (post-cleanup,
    # parallelism=8) so 200 × ~100s avg ≈ 333 min for tests, plus ~30 min
    # for the build. Cap of 600 min covers worst-case scheduling variance.
    # Each iteration is wrapped in 10-min `timeout` below so a single hang
    # fails fast instead of burning the whole budget.
    timeout-minutes: 600
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblzma-dev

      - run: echo "WEEK=$(date -u +%Y-%U)" >> "$GITHUB_ENV"
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: false
          cache-provider: "warpbuild"
          prefix-key: v0-rust-week-${{ env.WEEK }}

      - name: Install cargo-binstall
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-binstall

      - name: Install wasm-opt
        run: |
          cargo binstall --force --no-confirm --locked wasm-opt@0.116.1
          echo "${HOME}/.cargo/bin" >> $GITHUB_PATH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: nextest@0.9.126

      - name: Install cargo-make
        uses: taiki-e/install-action@d4422f254e595ee762a758628fe4f16ce050fa2e # v2.67.28
        with:
          tool: cargo-make@0.37.24

      - name: Build mpc-node
        run: cargo make build-mpc-node-network-hardship-simulation

      - name: Build mpc-contract
        run: cargo make build-mpc-contract-optimized

      - name: Build test-parallel-contract
        run: cargo make build-test-parallel-contract-optimized

      - name: Build backup-cli
        run: cargo build -p backup-cli --release --locked

      # Sample CPU/memory/load to a CSV across the whole iteration loop so we
      # can correlate flaky failures with runner resource contention. Mirrors
      # the per-job collector PR #3055 added to ci.yml. See near/mpc#2883.
      - name: Start resource-usage telemetry collector
        run: |
          mkdir -p target/telemetry flake-artifacts
          python3 scripts/collect-resource-usage.py \
            --interval 2 \
            --output target/telemetry/e2e-resource-usage.csv \
            > target/telemetry/collector.log 2>&1 &
          echo $! > target/telemetry/collector.pid
          echo "Started telemetry collector pid=$(cat target/telemetry/collector.pid)"

      - name: Run E2E tests in a loop
        env:
          RUST_LOG: info,e2e_tests=debug
          MPC_NODE_LOG: "DEBUG"
          E2E_KEEP_HOME_DIR: "1"
          # Make nextest emit stderr for *passing* tests too, so the grep
          # below sees every `E2E_HOME_DIR=` line. Without this nextest
          # silently drops passing-test stderr and the workflow leaks all
          # those /tmp dirs to disk — cumulative leak fills the runner.
          NEXTEST_SUCCESS_OUTPUT: final
          # `inputs.*` is empty on push events; fall back to the same defaults
          # advertised in the workflow_dispatch input block.
          ITERATIONS: ${{ inputs.iterations || '200' }}
          TEST_FILTER: ${{ inputs.test_filter || 'all' }}
          KEEP_ALL_HOMES: ${{ inputs.keep_all_homes && 'true' || 'false' }}
          # _run-e2e-logic in Makefile.toml exports these; we replicate them
          # here because we're calling nextest directly to support a filter.
          MPC_CONTRACT_WASM: ${{ github.workspace }}/target/wasm32-unknown-unknown/release-contract/mpc_contract.wasm
          MPC_PARALLEL_CONTRACT_WASM: ${{ github.workspace }}/target/wasm32-unknown-unknown/release-contract/test_parallel_contract.wasm
        run: |
          set +e
          pass=0
          fail=0
          mkdir -p flake-artifacts
          summary=flake-artifacts/summary.txt
          : > "$summary"

          # filter='all' (or empty) → no positional filter, runs whole suite.
          if [ -z "$TEST_FILTER" ] || [ "$TEST_FILTER" = "all" ]; then
            filter_args=()
            shown_filter="<all e2e tests>"
          else
            filter_args=("$TEST_FILTER")
            shown_filter="$TEST_FILTER"
          fi
          echo "filter='${shown_filter}' iterations=${ITERATIONS} keep_all_homes=${KEEP_ALL_HOMES}" | tee -a "$summary"

          # Keep one passing iter's nextest.log as a reference; drop later
          # passing iters so the artifact stays small at high iteration counts.
          kept_pass_sample=false

          for i in $(seq 1 "$ITERATIONS"); do
            echo "::group::iteration $i"
            out="flake-artifacts/iter-$i"
            mkdir -p "$out"

            start=$(date +%s)
            # Per-iteration cap: kill the run after 10 min so a single
            # hang can't burn the rest of the loop's budget. `timeout`
            # exits 124 on TERM, 137 on KILL — both surface as iter FAIL.
            timeout --kill-after=30s 10m \
              cargo nextest run \
                --cargo-profile=test-release \
                -p e2e-tests \
                --all-features \
                --locked \
                --profile ci-e2e \
                --no-fail-fast \
                "${filter_args[@]}" \
              2>&1 | tee "$out/nextest.log"
            rc=${PIPESTATUS[0]}
            elapsed=$(( $(date +%s) - start ))
            if [ "$rc" -eq 124 ] || [ "$rc" -eq 137 ]; then
              echo "iter $i: HIT 10min TIMEOUT" | tee -a "$out/nextest.log"
            fi
            echo "::endgroup::"

            # Move every E2E_HOME_DIR the test printed so we don't leak disk
            # between iterations. By default we keep them only on failure;
            # set keep_all_homes=true to keep them all (much larger artifact).
            # NB: nextest indents captured stderr (4 spaces), so we must NOT
            # anchor at start-of-line — match the marker anywhere on the line.
            grep -oE 'E2E_HOME_DIR=[^[:space:]]+' "$out/nextest.log" \
              | sed 's/^E2E_HOME_DIR=//' \
              | sort -u \
              | while read -r home; do
                  if [ -d "$home" ]; then
                    mv "$home" "$out/home_$(basename "$home")" 2>/dev/null || true
                  fi
                done

            if [ "$rc" -eq 0 ]; then
              pass=$((pass+1))
              echo "iter $i: PASS (${elapsed}s)" | tee -a "$summary"
              if [ "$KEEP_ALL_HOMES" != "true" ]; then
                rm -rf "$out"/home_*
              fi
              if [ "$kept_pass_sample" = "true" ]; then
                # Already kept one passing iter as a reference; drop this one
                # to keep the artifact bundle small at high iteration counts.
                rm -rf "$out"
              else
                kept_pass_sample=true
              fi
            else
              fail=$((fail+1))
              echo "iter $i: FAIL rc=$rc (${elapsed}s) — logs preserved in $out" | tee -a "$summary"
            fi

            # Hard cleanup between iterations. SIGKILL on `timeout` doesn't
            # run drop handlers, so test-spawned mpc-node / sandbox children
            # get orphaned to PID 1 and continue holding deterministic ports.
            # Likewise, `disable_cleanup(true)` on `tempfile::TempDir` means
            # every passing-test home dir lives forever in /tmp until we
            # remove it. Skip /tmp wipe when keep_all_homes=true so the user
            # can inspect them.
            pkill -9 -f 'mpc-node|near-sandbox|neard-sandbox' 2>/dev/null || true
            sleep 1
            if [ "$KEEP_ALL_HOMES" != "true" ]; then
              # Leave anything we already moved into flake-artifacts intact.
              find /tmp -maxdepth 1 -name '.tmp*' -type d -mmin -120 \
                -exec rm -rf {} + 2>/dev/null || true
            fi
            df -h / | tail -1 | tee -a "$summary"
          done

          echo "TOTAL: pass=$pass fail=$fail" | tee -a "$summary"
          if [ "$fail" -gt 0 ]; then exit 1; fi

      - name: Stop resource-usage telemetry collector
        if: always()
        run: |
          if [ -f target/telemetry/collector.pid ]; then
            pid=$(cat target/telemetry/collector.pid)
            kill -TERM "$pid" 2>/dev/null || true
            for _ in 1 2 3 4 5; do
              kill -0 "$pid" 2>/dev/null || break
              sleep 1
            done
            kill -KILL "$pid" 2>/dev/null || true
            rm -f target/telemetry/collector.pid
          fi
          # Copy into the artifact bundle so it lands alongside iter-N/.
          if [ -d target/telemetry ]; then
            cp -r target/telemetry flake-artifacts/telemetry || true
          fi

      - name: Print resource-usage summary
        if: always()
        run: |
          if [ -f target/telemetry/e2e-resource-usage.csv ]; then
            python3 scripts/summarize-resource-usage.py \
              --input target/telemetry/e2e-resource-usage.csv
          else
            echo "No telemetry CSV found; skipping summary."
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-flake-logs
          path: flake-artifacts/
          if-no-files-found: warn
          retention-days: 7
