name: Build Docker Node GCP Image

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push-images:
    name: "Build and push Docker node gcp image with commit hash"
    runs-on: warp-ubuntu-2404-x64-16x
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3 # v17

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push node gcp image
        env:
          IMAGE_NAME: mpc-node-gcp
        run: |
          set -euo pipefail

          branch="${GITHUB_REF_NAME//\//-}"
          short_sha=$(git rev-parse --short HEAD)
          tag="${branch}-${short_sha}"
          echo "Pushing as tag: ${tag}"

          archive=$(nix build --no-link --print-out-paths .#node-gcp-image)
          digest_file=$(nix build --no-link --print-out-paths .#node-gcp-image-manifest-digest)
          echo "Manifest digest: $(cat "$digest_file")"

          skopeo copy --preserve-digests \
            "docker-archive:${archive}" \
            "docker://docker.io/nearone/${IMAGE_NAME}:${tag}"
