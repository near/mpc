# Limit sandbox test parallelism to avoid resource contention and flaky timeouts.
# Each sandbox test spins up its own NEAR sandbox instance, so running too many
# concurrently causes request timeouts on CI.
[test-groups.contract-sandbox]
max-threads = 16

[profile.ci-contract]
[[profile.ci-contract.overrides]]
filter = 'package(mpc-contract) and test(/sandbox/)'
test-group = 'contract-sandbox'

[test-groups.e2e]
# TODO(#2898): tune this if parallel_sign_calls test is still flaky.
max-threads = 4

[profile.ci-e2e]
[[profile.ci-e2e.overrides]]
filter = 'package(e2e-tests)'
test-group = 'e2e'

# Each chain-gateway integration test stands up two nearcore nodes (~25 OS
# threads per test). Running them concurrently oversubscribes CI runners and
# starves the event-subscriber pipeline.
[test-groups.chain-gateway-integration]
max-threads = 2

[profile.ci-other]
default-filter = 'not package(mpc-node) and not package(mpc-contract) and not package(e2e-tests) and not package(contract-history) and not test(=tee_authority::tests::test_fetch_collateral_from_pccs) and not (test(/^registry::integration_tests::/) and package(tee-launcher))'

[[profile.ci-other.overrides]]
filter = 'package(chain-gateway) and binary(test)'
test-group = 'chain-gateway-integration'
